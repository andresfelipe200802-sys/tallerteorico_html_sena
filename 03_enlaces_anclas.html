<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enlaces</title>
</head>
<body>

    <!-- Los enlaces o anclas o hipervínculos -->
    <!-- (anchor) significa ancla. Metafóricamente como en un barco se mantiene en una ubicación específica un ancla es justamente para que el usuario sepa hacia dónde buscar un recurso o hacia dónde navegar en la página web. -->

    <!-- Los atributos son características que definen el comportamiento y la apariencia de los elementos en este caso el atributo href vuelve funcional a la etiqueta es por esta razón que se utiliza en el maquetado y no en el css dado que no es una característica visual. -->

    <!--Ref (Hyper reference) es la referencia a un recurso, es decir, el destino del enlace.-->
    <!--Lo que esta dentro de la etiqueta a es el texto visible que el usuario vera en la pagina web. Mientras que lo que esta dentro de href es la referencia al recurso al que apunta el enlace-->

    <h2 title="titulo de la pagina">Enlaces o anclas</h2>

    <!-- por otra parte. el atributo title proporciona un texto de ayuda que se muestra cuando el usuario pasa el mouse sobre el enlace. Las tecnologías de asistencia como lectores de pantalla utilizan este atributo para proporcionar información adicional al usuario. En el caso de personas invidentes esto les permite acceder a información adicional sobre el enlace. -->

    <a href="https://www.google.com">Google</a>
    <br>
    <a href="https://www.facebook.com">Facebook</a>
    <br>
    <a href="https://www.youtube.com">YouTube</a>
    <br>
    <a title="Ir al canal de youtube" href="//youtube.com/@ramcrack0584">Ramcrack</a> <!-- Mala práctica: usar protocolo relativo sin especificar el protocolo -->
    <br>
    <a href="03_1_pagina_enlaces.html">Ir a enlace uno</a>
    <br>
    <a href="03_2_pagina_enlaces.html">Ir a enlace dos</a>
    <br>
    <a href="03_3_pagina_enlaces.html">Ir a enlace tres</a>
    <br>

    <!-- Es sumamente importante que en la programación y el desarrollo web se realicen las prácticas a medida que se va avanzando, de esta forma se asegura una mejor comprensión y aplicación de los conceptos aprendidos. Entienda que la programación es un proceso activo no pasivo, una cosa es intentar comprender lo que sucede cuando leo o veo algo que se está haciendo, sin embargo, la única forma de aprender es probando ustedes mismos todo lo que se debe implementar. -->

    <h2>Enlaces con target a otra ventana</h2>

    <a href="03_4_pagina_enlaces.html" target="_blank">Ir a enlace cuatro en nueva ventana</a>

    <!-- El atributo target="_blank" abre el enlace en una nueva ventana o pestaña del navegador. Por defecto siempre está en self que significa que se abre en la misma ventana -->

</body>
</html>
