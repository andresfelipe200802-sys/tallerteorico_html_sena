<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagenes</title>
    
</head>
<body>
    <!--Etiquetas de bloque y Etiquetas de linea-->
    <h1>Imagenes</h1>
    <!--Las imagenes se intersan en html utilizando la etiqueta img. Esta etiqueta es un elemento vacio, lo que siginifica que no tiene una etiqueta de cierre,la sintaxis basica para insertar una imagen es:-->

    <!--Vale la pena recordar que el atributo title proporciona un tooltip que se muestra cuando el usuario pasa el mause sobre la imagen-->
    <img src="HTML5.png" alt="Logotipo de HTMLS" title="HTMLS" width="200" height="200">
    <!-- Para que los lectores de pantalla puedan saber de que se trata la imagen el atributo alt (alternative tex)es muy importante puesto que proporciona una descripcion textual de la imagen para la accesibilidad y como fallback si no se carga. El texto alternativo debe ser descriptivo y consiso, y debe transmitir la informacion esencial que la imagen representa. Por ejemplo, si la imagen es un logotipo de una empresa, el texto alternativo podria ser "logotipo de la empresa "XYZ". si la imagen es una fotografia de un paisaje, el texto alternativo podria ser "Fotografia de un paisaje con montañas y un lago. En resumen, el atributo alt proporciona una descripcion de la imagen en caso de que no se pueda cargar"-->

     <!--Self closing Tags son etiquetas que se autocierran-->

</body>
</html>
