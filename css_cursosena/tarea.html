<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarea</title>
</head>
<body>

    <h1>Actividad de crear una orden list o unordered list</h1>
    <h2>Mis motos favoritas</h2>
    <ul>
        <li id="z900">Kawasaki z900 2024</li>
        <li class="Mt-09">Yamaha Mt-09 v2</li>
        <li class="gsxs-750">Susuki gsxs-750</li>
        <li class="R1M">Yamaha R1M</li>
        <li class="R6">Yamaha R6</li>
    </ul>
    <style>
        #z900{
            color: green;
        }
        .Mt-09{
            color: rgb(0, 0, 162);
        }
        .gsxs-750{
            color: rgb(41, 80, 239);
        }
        .R1M{
            color: rgb(99, 98, 98);
        }
        .R6{
            color: rgb(130, 10, 10);
        }
    </style>
    <table border="1"><!--etiqueta de apertura-->

<tr>
    <th>Moto</th>
    <th>Descripción</th>

</tr>
<tr>
    <th>dato 1</th>
    <th>dato 2</th>
    <th>dato 3</th>
</tr>
<tr>
    <th>dato 4</th>
    <th>dato 5</th>
    <th>dato 6</th>
</tr>


</table>
    
</body>
</html>
